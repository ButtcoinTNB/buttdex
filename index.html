  <script>
    // Theme switcher functionality
    document.addEventListener('DOMContentLoaded', () => {
      const themeToggle = document.getElementById('theme-toggle');
      const themeIcon = document.getElementById('theme-icon');
      const siteLogo = document.getElementById('site-logo');
      const logoLight = 'https://ipfs.io/ipfs/bafkreic4h3qlk5ezs2ajufdtfvpaqcm7ogabsj4kbghthosc6bw6s3kwry';
      const logoDark = 'butt-banner-light.png'; // Path to light version of logo
      
      // Check for saved user preference, otherwise use system preference
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeIcon.src = 'https://cdn-icons-png.flaticon.com/512/3073/3073665.png'; // moon icon
        siteLogo.src = logoDark;
      }
      
      themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
          themeIcon.src = 'https://cdn-icons-png.flaticon.com/512/702/702471.png'; // sun icon
          siteLogo.src = logoLight;
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
          themeIcon.src = 'https://cdn-icons-png.flaticon.com/512/3073/3073665.png'; // moon icon
          siteLogo.src = logoDark;
        }
      });
    });

    // Main Jupiter Terminal initialization
    window.addEventListener('DOMContentLoaded', () => {
      const errorContainer = document.getElementById('error-container');
      const terminalWrapper = document.getElementById('terminal-wrapper');
      const loadingElement = document.getElementById('terminal-loading');
      
      // Securely get RPC endpoints without exposing API keys
      function getSecureRpcEndpoints() {
        // Get endpoints array - with QuickNode from environment variable as primary
        // Then fallback to public endpoints if the primary fails
        return [
          window.QUICKNODE_URL, // Primary QuickNode RPC from env variable (set in Vercel)
          "https://solana-mainnet.rpc.extrnode.com", // Extrnode public RPC
          "https://solana.rpcpool.com", // RPCPool public RPC
          "https://rpc.ankr.com/solana", // Ankr public RPC
          "https://api.mainnet-beta.solana.com", // Solana's public RPC (often rate limited)
          "https://solana-api.projectserum.com" // Project Serum RPC
        ].filter(Boolean); // Filter out any undefined/null endpoints (in case env var isn't set)
      }
      
      // Get secure endpoints
      const rpcEndpoints = getSecureRpcEndpoints();
      
      // Start the initialization process
      let currentEndpointIndex = 0;
      
      // Function to check if Jupiter is available
      function waitForJupiter() {
        if (window.Jupiter && typeof window.Jupiter.init === 'function') {
          initJupiterWithEndpoint(rpcEndpoints[currentEndpointIndex]);
        } else {
          setTimeout(waitForJupiter, 200);
        }
      }
      
      // Start checking for Jupiter
      waitForJupiter();
      
      // Function to handle errors and try next endpoint
      function initJupiterWithEndpoint(currentEndpoint) {
        console.log("Initializing Jupiter with endpoint:", currentEndpoint);
        
        try {
          // Check if there's an existing instance and resume it
          if (window.Jupiter._instance) {
            window.Jupiter.resume();
            terminalWrapper.classList.add('jupiter-ready');
          } else {
            window.Jupiter.init({
              displayMode: "integrated",
              integratedTargetId: "integrated-terminal",
              endpoint: currentEndpoint,
              
              // Set tokens based on values (SOL first, then BUTTCOIN)
              formProps: {
                initialInputMint: "So11111111111111111111111111111111111111112", // SOL
                initialOutputMint: "FasH397CeZLNYWkd3wWK9vrmjd1z93n3b59DssRXpump", // BUTTCOIN
                fixedOutputMint: false,
                initialSlippageBps: 50, // 0.5% slippage
                showBalance: true,
                showToken: true
              },
              
              // Platform fee accounts
              platformFeeAndAccounts: [{
                feeBps: 99, // 0.99% fee
                feeAccount: "4R76yfzn8Gg9kbZ5dYfQSveGNUTaonheT92kEC3ao3w5"
              }],
              
              // Add prioritization fees to help transactions go through during congestion
              prioritizationFeeLamports: "auto",
              
              // Optimize compute units usage
              dynamicComputeUnitLimit: true,
              
              // Simplified theme settings - using their documented approach
              appearance: "dark",
              
              // Container styles (only using basic CSS-in-JS properties)
              containerStyles: { 
                width: "100%",
                borderRadius: "20px",
                boxShadow: `0 0 20px var(--shadow-color)`,
                backgroundColor: "var(--terminal-bg-color)",
                padding: "0",
                margin: "0",
                marginBottom: "0"
              },
              
              // Adding a class for additional customization
              containerClassName: "jupiter-terminal-custom",
              
              onSuccess: ({ txid }) => {
                console.log("Swap successful! TxID:", txid);
                // Hide any error messages on success
                if (errorContainer) errorContainer.style.display = 'none';
              },
              onSwapError: ({ error }) => {
                console.error("Swap error:", error);
                if (rpcEndpoints.length > 1) {
                  // Try the next endpoint
                  currentEndpointIndex = (currentEndpointIndex + 1) % rpcEndpoints.length;
                  const nextEndpoint = rpcEndpoints[currentEndpointIndex];
                  
                  // Display error and retry message
                  displayError(`RPC connection failed. Trying next endpoint: ${nextEndpoint}`);
                  
                  // Try to init with the next endpoint - but first close the current instance
                  if (window.Jupiter && window.Jupiter.close) {
                    window.Jupiter.close();
                    // Short delay before initializing with the new endpoint
                    setTimeout(() => {
                      initJupiterWithEndpoint(nextEndpoint);
                    }, 500);
                  } else {
                    initJupiterWithEndpoint(nextEndpoint);
                  }
                } else {
                  displayError("Swap failed. Please try again later or refresh the page.");
                }
              },
              onScreenUpdate: (screen) => {
                // Monitor for RPC errors and take action if needed
                if (screen && screen.error && screen.error.message && 
                    (screen.error.message.includes("RPC") || screen.error.message.includes("timeout"))) {
                  // Try another endpoint automatically
                  currentEndpointIndex = (currentEndpointIndex + 1) % rpcEndpoints.length;
                  const nextEndpoint = rpcEndpoints[currentEndpointIndex];
                  
                  displayError(`RPC issue detected. Switching to backup RPC: ${nextEndpoint}`);
                  
                  // Close and reinitialize with new endpoint
                  if (window.Jupiter && window.Jupiter.close) {
                    window.Jupiter.close();
                    setTimeout(() => {
                      initJupiterWithEndpoint(nextEndpoint);
                    }, 500);
                  }
                }
              }
            });

            // Handle terminal ready state
            // Give Jupiter a moment to initialize the UI
            setTimeout(() => {
              terminalWrapper.classList.add('jupiter-ready');
            }, 1500);
          }
        } catch (error) {
          console.error("Jupiter initialization error:", error);
          // Try the next endpoint in case of initialization error
          currentEndpointIndex = (currentEndpointIndex + 1) % rpcEndpoints.length;
          const nextEndpoint = rpcEndpoints[currentEndpointIndex];
          
          displayError(`Jupiter initialization failed. Trying backup RPC: ${nextEndpoint}`);
          
          // Try the next endpoint after a short delay
          setTimeout(() => {
            initJupiterWithEndpoint(nextEndpoint);
          }, 1000);
        }
      }
      
      // Display error messages in the error container
      function displayError(message) {
        const errorContainer = document.getElementById('error-container');
        if (errorContainer) {
          errorContainer.style.display = 'block';
          errorContainer.textContent = message;
        }
      }
    });
  </script>
  
  <!-- Mobile Phantom wallet redirect helper -->
  <script>
    // This script helps redirect mobile users directly to Phantom app when connecting a wallet
    document.addEventListener('DOMContentLoaded', () => {
      // Create a function to check if Jupiter Terminal is ready
      function checkJupiterReady() {
        if (window.Jupiter && window.Jupiter.init) {
          initPhantomRedirectHelper();
        } else {
          // If not ready yet, check again soon
          setTimeout(checkJupiterReady, 500);
        }
      }
      
      // Start checking
      checkJupiterReady();
      
      function initPhantomRedirectHelper() {
        // Function to check if user is on mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Check if we're inside Phantom browser
        const isInPhantomBrowser = window.location.href.includes('phantom.app') || 
                                   window.navigator.userAgent.includes('Phantom') ||
                                   (typeof window.phantom !== 'undefined');
        
        if (isMobile) {
          // Handle behavior differently if we're already in Phantom's browser
          if (isInPhantomBrowser) {
            console.log("We are inside Phantom's browser!");
            
            // Add a special handler for wallet connection buttons when inside Phantom browser
            document.addEventListener('click', (event) => {
              // Look for connect wallet buttons by common text patterns
              if (event.target && 
                  event.target.closest('button') && 
                  (event.target.textContent.includes('Connect') || 
                   event.target.textContent.includes('Wallet') ||
                   event.target.closest('button').textContent.includes('Connect') || 
                   event.target.closest('button').textContent.includes('Wallet'))) {
                
                // Prevent the default behavior that takes us to the download page
                event.preventDefault();
                event.stopPropagation();
                
                // Try to select the Phantom wallet directly in the Jupiter interface
                setTimeout(() => {
                  // Attempt to programmatically connect to Phantom
                  if (window.phantom && window.phantom.solana && window.phantom.solana.connect) {
                    window.phantom.solana.connect()
                      .then(() => console.log("Successfully connected to Phantom wallet"))
                      .catch(err => console.error("Failed to connect to Phantom wallet:", err));
                  } else {
                    console.log("Looking for Phantom option in the wallet list");
                    // Look for Phantom option in any modal that might have opened
                    const phantomOptions = Array.from(document.querySelectorAll('div')).filter(
                      div => (div.innerText.includes('Phantom') || div.innerText.toLowerCase().includes('phantom')) && 
                            div.offsetParent !== null && 
                            !div.innerText.includes('Download')
                    );
                    
                    // Click the first valid Phantom option
                    if (phantomOptions.length > 0) {
                      console.log("Found Phantom option, clicking it");
                      phantomOptions[0].click();
                    } else {
                      console.log("No Phantom option found in the wallet list");
                    }
                  }
                }, 300);
              }
            }, true);
            
          } else {
            // We're on mobile but not in Phantom browser, so use deeplink to open Phantom
            document.addEventListener('click', (event) => {
              // Look for connect wallet buttons by common text patterns
              if (event.target && 
                  event.target.closest('button') && 
                  (event.target.textContent.includes('Connect') || 
                   event.target.textContent.includes('Wallet') ||
                   event.target.closest('button').textContent.includes('Connect') || 
                   event.target.closest('button').textContent.includes('Wallet'))) {
                
                // Generate the appropriate deeplink for Phantom wallet
                let deepLink = 'https://phantom.app/ul/browse/';
                
                // Get the current URL
                const currentUrl = encodeURIComponent(window.location.href);
                
                // Use the browse deeplink to open current page in Phantom's in-app browser
                deepLink += currentUrl + '?ref=' + currentUrl;
                
                // Save user's intention to connect wallet in session storage
                sessionStorage.setItem('phantom_connect_pending', 'true');
                
                // Redirect to Phantom app
                window.location.href = deepLink;
                
                // Prevent default button action
                event.preventDefault();
                event.stopPropagation();
              }
            }, true);
          }
          
          // Check if user is returning from Phantom app with intention to connect
          if (sessionStorage.getItem('phantom_connect_pending') === 'true') {
            // Clear the pending flag
            sessionStorage.removeItem('phantom_connect_pending');
            
            // If Jupiter is present, try to automatically open wallet selection
            if (window.Jupiter && window.Jupiter._instance) {
              // Find and click wallet connect button after a short delay
              setTimeout(() => {
                const walletButtons = Array.from(document.querySelectorAll('button')).filter(
                  button => button.innerText.includes('Connect') || button.innerText.includes('Wallet')
                );
                
                if (walletButtons.length > 0) {
                  walletButtons[0].click();
                }
              }, 1000);
            }
          }
        }
      }
    });
  </script>
